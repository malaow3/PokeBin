services:
  app:
    build: .
    expose:
      - "2000"
    networks:
      - coolify

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - coolify

networks:
  coolify:
    external: true
